version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "9001:3001"
    env_file: .env
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "9000:3000"
    depends_on:
      - api

  engine:
    build:
      context: .
      dockerfile: infra/docker/engine.Dockerfile
    ports:
      - "9002:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mirofish

  mirofish:
    build:
      context: ./services/mirofish-adapter
      dockerfile: Dockerfile
    ports:
      - "9003:5000"
    environment:
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4o-mini}
      ZEP_API_KEY: ${ZEP_API_KEY}
    volumes:
      - ./services/mirofish-adapter:/app
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-trading_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
